<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:#f4ede2;-webkit-tap-highlight-color:transparent}
.kn{font-family:'Noto Sans Kannada',sans-serif!important}
.kn *{font-family:'Noto Sans Kannada',sans-serif!important}
#root{min-height:100vh}
button,input{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#e8d8c0}
::-webkit-scrollbar-thumb{background:#c17f3a;border-radius:3px}
table{border-collapse:collapse;width:100%}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease forwards}
/* Grid system */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g2a{display:grid;grid-template-columns:1.05fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
/* Mobile overrides */
@media(max-width:860px){
  .g4{grid-template-columns:repeat(2,1fr)}
  .g2a{grid-template-columns:1fr}
  .g3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:540px){
  .g4{grid-template-columns:repeat(2,1fr);gap:8px}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:repeat(2,1fr)}
  main{padding:12px 11px!important}
  .hdr-sub{display:none!important}
  .tab-btn{padding:9px 10px!important;font-size:11px!important}
}
@media(max-width:380px){
  .g3{grid-template-columns:1fr}
}
/* Lang toggle pill */
.lang-btn{display:flex;align-items:center;gap:0;border-radius:20px;overflow:hidden;border:1.5px solid rgba(255,255,255,0.25)}
.lang-btn button{padding:4px 11px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all 0.2s;line-height:1.4}
</style>

function LoginScreen({onLogin,onCancel}){
  const lang=useLang();
  const [uid,setUid]=useState("");const [pw,setPw]=useState("");
  const [show,setShow]=useState(false);const [err,setErr]=useState("");const [shaking,shake]=useState(false);const [loading,setLoading]=useState(false);
  const attempt=async()=>{
    if(!uid.trim()||!pw){setErr("Please enter username and password");shake(true);setTimeout(()=>shake(false),500);return;}
    setLoading(true);
    try{
      const res=await fetch("/.netlify/functions/verify-admin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
      const data=await res.json();
      if(data.token&&uid.trim()==="ramesh"){onLogin();}
      else{setErr(tx(t.loginErr,lang));shake(true);setTimeout(()=>shake(false),500);}
    }catch(e){setErr("Login failed");shake(true);setTimeout(()=>shake(false),500);}
    setLoading(false);
  };
  const fontClass=lang==="kn"?"kn":"";
  return(
    <div className={fontClass} style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:26}}>
          <div style={{fontSize:44,marginBottom:8}}>🌿</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,color:C.primary}}>{tx(t.farmTitle,lang)}</div>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>{tx(t.loginSub,lang)}</div>
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"24px",boxShadow:"0 4px 24px rgba(28,61,42,0.12)",animation:shaking?"shake 0.4s":"none"}}>
          <div style={{fontSize:14,fontWeight:700,color:C.primary,marginBottom:16}}>🔒 {tx(t.loginTitle,lang)}</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:11,fontWeight:700,color:C.muted,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>{tx(t.loginUser,lang)}</label>
            <input value={uid} onChange={e=>{setUid(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="ramesh" autoCapitalize="none" style={{width:"100%",padding:"10px 13px",borderRadius:8,border:`1.5px solid ${err?"#fca5a5":C.border}`,fontSize:14,color:C.text,background:"#fff",outline:"none"}}/>
          </div>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:11,fontWeight:700,color:C.muted,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>{tx(t.loginPass,lang)}</label>
            <div style={{position:"relative"}}>
              <input type={show?"text":"password"} value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&attempt()} style={{width:"100%",padding:"10px 44px 10px 13px",borderRadius:8,border:`1.5px solid ${err?"#fca5a5":C.border}`,fontSize:14,color:C.text,background:"#fff",outline:"none"}}/>
              <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:11,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:15,color:C.muted,padding:0}}>{show?"🙈":"👁️"}</button>
            </div>
          </div>
          {err&&<div style={{fontSize:12,color:"#dc2626",background:"#fff5f5",border:"1px solid #fca5a5",borderRadius:8,padding:"7px 11px",marginBottom:14}}>⚠ {err}</div>}
          <button onClick={attempt} style={{width:"100%",padding:"11px",background:C.primary,color:"#fff",border:"none",borderRadius:10,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:9,boxShadow:"0 3px 12px rgba(28,61,42,0.3)"}}>{tx(t.loginBtn,lang)}</button>
          <button onClick={onCancel} style={{width:"100%",padding:"8px",background:"transparent",color:C.muted,border:`1px solid ${C.border}`,borderRadius:10,fontSize:13,cursor:"pointer"}}>{tx(t.loginBack,lang)}</button>
        </div>
        <div style={{textAlign:"center",marginTop:14,fontSize:11,color:C.muted}}>{tx(t.loginRestrict,lang)}</div>
      </div>
    </div>
  );
}

function OverviewTab({day,setDay,audioManifest,isAdmin}){

  const wdays=lang==="kn"?weekDaysKn:weekDaysEn;
  const wdayKeys=weekDaysEn;
  const [openMonth,setOpenMonth]=useState("April");
  const [autoplayFailed,setAutoplayFailed]=useState(false);
  const curMonthEn=new Date().toLocaleString("default",{month:"long"});

  React.useEffect(()=>{
    if(lang!=="kn"||isAdmin)return;
    const today=new Date().toLocaleDateString("en-US",{weekday:"long"}).toLowerCase();
    const isSunday=today==="sunday";
    const audioType=isSunday?"weekly":"daily";
    const audioDay=isSunday?"sunday":today;
    const audioFile=isSunday?audioManifest.weekly?.[audioDay]:audioManifest.daily?.[audioDay];
    if(!audioFile?.url)return;
    const audioPlayer=document.getElementById("podcast-player")||{play:()=>Promise.reject()};
    audioPlayer.src=audioFile.url;
    audioPlayer.play?.().catch(()=>{setAutoplayFailed(true);});
  },[lang,isAdmin,audioManifest]);

  const playPodcast = async () => {
      const player = document.getElementById('podcast-player');
      const button = document.getElementById('play-podcast-btn');

      button.textContent = 'Generating...';
      button.disabled = true;

      const script = `HOST: ಇಂದಿನ ಕೃಷಿ ಕೆಲಸದ ನಿಮಿಷಾ. Today's farm tasks:\nHOST: 6:00–6:30 ನೀರಾವರಿ ತಪಾಸಣೆ. Irrigation check: verify drip lines, clean filters.\nEXPERT: 7:00–8:00 ಹವಾಮಾನ ಪರಿಶೀಲನೆ. Weather check: record temperature and humidity.\nHOST: 9:00–10:00 ದೃಶ್ಯ ಗಸ್ತು. Visual scouting: inspect trees for pests and disease.`;

      try {
        const res = await fetch("/.netlify/functions/generate-audio", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${adminToken||""}`
          },
          body: JSON.stringify({ type:"daily", day:new Date().toLocaleDateString("en-US",{weekday:"long"}).toLowerCase(), script })
        });

        if (res.ok) {
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          player.src = url;
          player.style.display = 'block';
          player.play();
          button.style.display = 'none';
        } else {
          console.error("Failed to generate podcast");
          button.textContent = 'Generation Failed. Retry?';
          button.disabled = false;
        }
      } catch (error) {
        console.error("Error generating podcast:", error);
        button.textContent = 'Generation Failed. Retry?';
        button.disabled = false;
      }
  }

    <div className="fade-in">

        ].map((s,i)=>(
          <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px",borderTop:`3px solid ${s.accent}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{fontSize:22,marginBottom:5}}>{s.icon}</div>
            <div style={{fontSize:18,fontWeight:800,color:s.accent,fontFamily:"'Playfair Display',serif"}}>{s.val}</div>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginTop:2}}>{tx(s.label,lang)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2,lineHeight:1.4}}>{tx(s.sub,lang)}</div>
          </div>
        ))}
      </div>

      <div className="g2a">

          <Hdr icon="⏰" title={tx(t.dailySched,lang)} accent={C.accent}/>

            <span style={{fontSize: 20, flexShrink: 0}}>🎵</span>
            <div style={{flex: 1, minWidth: 0}}>
              {!autoplayFailed?(

/* ─── ADMIN LOGIN ─── */
function AdminLoginModal({onLogin,onCancel}){
  const lang=useLang();
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const attempt=async()=>{
    setLoading(true);
    setErr("");
    try{
      const res=await fetch("/.netlify/functions/verify-admin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
      const data=await res.json();
      if(data.token){onLogin(data.token);}
      else{setErr("Invalid admin password");}
    }catch(e){setErr("Login failed");}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"32px",maxWidth:320,width:"100%",boxShadow:"0 10px 40px rgba(0,0,0,0.1)"}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>🔐 Admin Access</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:20,lineHeight:1.5}}>Enter admin password to manage audio files and tasks</div>
        <input type="password" placeholder="Admin Password" value={pw} onChange={(e)=>setPw(e.target.value)} onKeyPress={(e)=>e.key==="Enter"&&attempt()} style={{width:"100%",padding:"9px 12px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:12,marginBottom:12,fontFamily:"inherit"}}/>
        {err&&<div style={{fontSize:11,color:"#dc2626",marginBottom:12,background:"#fee2e2",padding:"8px",borderRadius:6}}>{err}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={attempt} disabled={loading} style={{flex:1,padding:"10px",background:"#1c3d2a",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",opacity:loading?0.6:1}}>
            {loading?"Verifying...":"Sign In"}
          </button>
          <button onClick={onCancel} style={{flex:1,padding:"10px",background:C.accentLight,color:C.accent,border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer"}}>
            Cancel
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── AUDIO MANAGEMENT ─── */
function AudioMgmtTab({tasks,setTasks,audioManifest,setAudioManifest,adminToken,onLogout}){
  const lang=useLang();
  const daysOfWeek=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const [generating,setGenerating]=useState(null);

  const handleGenerate=async(type,day)=>{
    setGenerating(`${type}-${day}`);
    try{
      const dayTasks=tasks[type]?.[day]||[];
      let script=`HOST: ಇಂದಿನ ಕೃಷಿ ಕೆಲಸದ ನಿರ್ದೇಶನ\n`;
      dayTasks.forEach(task=>{script+=`HOST: ${task.kn?.task||''}\nEXPERT: ${task.kn?.detail||''}\n`;});

      const res=await fetch("/.netlify/functions/generate-audio",{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${adminToken}`},body:JSON.stringify({type,day,script})});
      const data=await res.json();
      if(data.success){
        setAudioManifest(prev=>({...prev,[type]:{...prev[type],[day]:{generatedAt:new Date().toISOString(),url:data.url}}}));
      }else{alert(`Error: ${data.error}`);}
    }catch(e){alert(`Generation failed: ${e.message}`);}
    setGenerating(null);
  };

  return(
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:16,fontWeight:700,color:C.text}}>🎵 Audio Management & Task Editor</h2>
        <button onClick={onLogout} style={{padding:"6px 12px",fontSize:11,fontWeight:700,background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,cursor:"pointer"}}>Logout</button>
      </div>

      <div style={{marginBottom:30}}>
        <h3 style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Daily Tasks</h3>
        <div className="g2">
          {daysOfWeek.map(day=>(
            <AudioDayCard key={day} type="daily" day={day.toLowerCase()} tasks={tasks.daily?.[day.toLowerCase()]||[]} metadata={audioManifest.daily?.[day.toLowerCase()]} generating={generating===`daily-${day.toLowerCase()}`} onGenerate={()=>handleGenerate("daily",day.toLowerCase())}/>
          ))}
        </div>
      </div>

      <div>
        <h3 style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Weekly Tasks (Sunday)</h3>
        <AudioDayCard type="weekly" day="sunday" tasks={tasks.weekly?.sunday||[]} metadata={audioManifest.weekly?.sunday} generating={generating==="weekly-sunday"} onGenerate={()=>handleGenerate("weekly","sunday")}/>
      </div>
    </div>
  );
}

function AudioDayCard({type,day,tasks,metadata,generating,onGenerate}){
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontWeight:700,textTransform:"capitalize",fontSize:12,color:C.text}}>{day} {metadata?"✓":"◯"}</div>

}

            {/* Language toggle */}
            <div className="lang-btn">
              <button onClick={()=>setLang("en")} style={{background:lang==="en"?C.accent:"rgba(255,255,255,0.1)",color:lang==="en"?"#fff":"rgba(255,255,255,0.7)"}}>EN</button>
              <button onClick={()=>setLang("kn")} style={{background:lang==="kn"?C.accent:"rgba(255,255,255,0.1)",color:lang==="kn"?"#fff":"rgba(255,255,255,0.7)"}}>ಕ</button>
            </div>
            <div style={{color:"#7dbf94",fontSize:10,fontWeight:600}}>{new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div>
          </div>
        </div>

        {/* TAB BAR */}
        <div style={{background:C.primary,padding:"0 8px",display:"flex",gap:0,overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none"}}>
          {tabs.map(t2=>(
            <button key={t2.id} className="tab-btn" onClick={()=>goToTab(t2.id)} style={{padding:"10px 12px",fontSize:11,fontWeight:tab===t2.id?700:400,border:"none",cursor:"pointer",color:tab===t2.id?C.accent:"#7dbf94",background:tab===t2.id?"rgba(193,127,58,0.15)":"transparent",borderBottom:tab===t2.id?"2.5px solid "+C.accent:"2.5px solid transparent",whiteSpace:"nowrap",transition:"all 0.2s",flexShrink:0}}>
              {t2[lang]}
              {t2.id==="inventory"&&!loggedIn&&<span style={{fontSize:9,marginLeft:3,opacity:0.65}}>🔒</span>}
              {t2.id==="inventory"&& loggedIn&&<span style={{fontSize:9,marginLeft:3}}>🟢</span>}
            </button>
          ))}
        </div>

        {/* CONTENT */}
        <main style={{padding:"16px 18px",maxWidth:1100,margin:"0 auto"}}>
          {tab==="overview"     &&<OverviewTab     day={day} setDay={setDay} audioManifest={audioManifest} isAdmin={isAdmin}/>}
          {tab==="avocado"      &&<AvocadoTab/>}
          {tab==="custardapple" &&<CustardAppleTab/>}
          {tab==="guava"        &&<GuavaTab/>}
          {tab==="inventory"    &&<InventoryTab    inventory={inventory} setInventory={setInventory} onLogout={handleLogout}/>}
          {tab==="audio-mgmt"   &&<AudioMgmtTab    tasks={tasks} setTasks={setTasks} audioManifest={audioManifest} setAudioManifest={setAudioManifest} adminToken={adminToken} onLogout={handleAdminLogout}/>}
        </main>
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
